<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Society Owner Registration — Live Dashboard</title>
<meta name="description" content="Realtime dashboard of BDA society owner form responses: blocks, flats, vehicles, duplicates, data quality." />
<style>
  :root{
    --bg:#0b1220; --panel:#111a2e; --panel2:#0f172a; --line:#1f2a44;
    --text:#e6ecff; --muted:#8ea0c8; --brand:#3b82f6; --ok:#22c55e;
    --warn:#f59e0b; --bad:#ef4444; --chip:#1e293b;
    --clear:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-text-size-adjust:100%}
  header{padding:16px 14px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(11,18,32,.95);backdrop-filter:blur(8px);z-index:5}
  h1{margin:0 0 4px;font-size:18px}
  .sub{color:var(--muted);font-size:12px}
  main{padding:12px;max-width:1100px;margin:0 auto}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  @media(min-width:640px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
  .kpi .n{font-size:22px;font-weight:700}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .toolbar{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;display:flex;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;overflow:hidden}
  .search input{flex:1;padding:11px 12px;background:transparent;border:0;color:var(--text);
    font-size:15px;outline:none}
  .clear-btn{border:0;background:var(--clear);color:#fff;font-weight:800;
    padding:0 16px;font-size:14px;letter-spacing:.04em;cursor:pointer;
    text-transform:uppercase}
  .clear-btn:active{filter:brightness(.9)}
  select,.btn{background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:10px;font-size:14px}
  .btn{cursor:pointer}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;
    scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:8px 12px;border-radius:999px;background:var(--chip);color:var(--muted);
    border:1px solid var(--line);white-space:nowrap;cursor:pointer;font-size:13px}
  .tab.active{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:12px}
  .card h2{margin:0 0 10px;font-size:14px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
  .tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .bar{height:6px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-top:4px}
  .bar>i{display:block;height:100%;background:var(--brand)}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
  .pill.ok{background:rgba(34,197,94,.15);color:#4ade80}
  .pill.warn{background:rgba(245,158,11,.15);color:#fbbf24}
  .pill.bad{background:rgba(239,68,68,.15);color:#f87171}
  a{color:#7dd3fc}
  .wa{display:inline-block;background:#25d366;color:#052e16;font-weight:700;
    padding:5px 10px;border-radius:8px;text-decoration:none;font-size:12px}
  .empty{text-align:center;color:var(--muted);padding:24px}
  .footer{color:var(--muted);font-size:11px;text-align:center;padding:16px 8px 32px}
  .loading{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted)}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:s 1s linear infinite;margin-right:10px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>🏢 Society Owner Registration</h1>
  <div class="sub" id="sub">Loading live data from Google Form responses…</div>
</header>
<main id="app">
  <div class="loading"><div class="spin"></div>Fetching responses…</div>
</main>
<div class="footer" id="foot"></div>

<script>
const SHEET_ID = "1QQ6lkJAO2oZprVqUWPyV5S4ouROkoxAJuHg_p287a14";
const SHEET_NAME = "Form Responses 1";
const GVIZ = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;

const REMINDER_MSG = "Namaste! Please complete your BDA society owner registration form: https://forms.gle/ — thank you.";

let ROWS=[], TAB="summary", Q="", BLOCK_FILTER="";

async function load(){
  try{
    const r = await fetch(GVIZ,{cache:"no-store"});
    const t = await r.text();
    const json = JSON.parse(t.substring(t.indexOf("{"), t.lastIndexOf("}")+1));
    ROWS = parseGviz(json);
    document.getElementById("sub").textContent =
      `${ROWS.length} responses · updated ${new Date().toLocaleString()}`;
    render();
  }catch(e){
    document.getElementById("app").innerHTML =
      `<div class="card"><b>Failed to load.</b><br><span class="sub">${e.message}</span><br><br>
       Make sure the Google Sheet is shared as <b>Anyone with link — Viewer</b>.</div>`;
  }
}

function parseGviz(j){
  const cols = j.table.cols.map(c=> (c.label||c.id||"").trim());
  const idx = {};
  cols.forEach((l,i)=>{
    const k = l.toLowerCase();
    if(!idx.ts && k.includes("timestamp")) idx.ts=i;
    else if(!idx.email && k.includes("email")) idx.email=i;
    else if(!idx.name && k.includes("name")) idx.name=i;
    else if(!idx.phone && (k.includes("whatsapp")||k.includes("mobile")||k.includes("phone")||k.includes("number"))) {
      if(!k.includes("flat")&&!k.includes("block")&&!k.includes("vehicle")) idx.phone=i;
    }
    if(!idx.block && k.startsWith("block")) idx.block=i;
    if(!idx.flat && k.startsWith("flat")) idx.flat=i;
    if(!idx.resident && k.includes("resident")) idx.resident=i;
    if(!idx.vnum && k.includes("vehicle")) idx.vnum=i;
    if(!idx.vtype && (k==="type"||k.includes("vehicle type"))) idx.vtype=i;
    if(!idx.bf && (k.replace(/\s/g,"")==="block-flat"||k.toLowerCase().includes("block-flat"))) idx.bf=i;
  });
  return j.table.rows.map(r=>{
    const g = i => (i==null||!r.c[i])?"":(r.c[i].f||r.c[i].v||"");
    const gd = i => (i==null||!r.c[i]||!r.c[i].v)?null:
      (typeof r.c[i].v==="string"&&r.c[i].v.startsWith("Date("))
        ? new Date(...r.c[i].v.slice(5,-1).split(",").map(Number))
        : new Date(r.c[i].v);
    const bf = String(g(idx.bf)||"").trim();
    let block = String(g(idx.block)||"").trim();
    let flat = String(g(idx.flat)||"").trim();
    if(bf && bf.includes("-")){ const [b,f]=bf.split("-"); block=block||b; flat=flat||f; }
    const flatId = normalizeFlat(block,flat,bf);
    const phone = normalizePhone(g(idx.phone));
    return{
      ts: gd(idx.ts),
      email: String(g(idx.email)||"").trim().toLowerCase(),
      name: titleCase(String(g(idx.name)||"").trim()),
      phone,
      block: normalizeBlock(block),
      flat: String(flat).replace(/\D/g,""),
      flatId,
      resident: String(g(idx.resident)||"").trim(),
      vnum: String(g(idx.vnum)||"").trim().toUpperCase().replace(/\s+/g,""),
      vtype: String(g(idx.vtype)||"").trim(),
      _phoneValid: /^[6-9]\d{9}$/.test(phone),
      _flatValid: !!flatId,
    };
  });
}

function normalizeBlock(b){
  const m = String(b||"").match(/\d+/);
  return m ? "B"+String(m[0]).padStart(2,"0") : "";
}
function normalizeFlat(block,flat,bf){
  const b = normalizeBlock(block) || (bf.match(/B?\d+/i)?.[0] ? "B"+String(bf.match(/\d+/)[0]).padStart(2,"0"):"");
  let f = String(flat||"").replace(/\D/g,"");
  if(!f && bf){ const parts=bf.split(/[-\s]+/); f=(parts[1]||"").replace(/\D/g,""); }
  if(!b||!f) return "";
  f = f.padStart(3,"0").slice(-3);
  return `${b}-${f}`;
}
function normalizePhone(v){
  const d = String(v||"").replace(/\D/g,"");
  if(d.length===10) return d;
  if(d.length===12&&d.startsWith("91")) return d.slice(2);
  if(d.length===11&&d.startsWith("0")) return d.slice(1);
  const m = d.match(/[6-9]\d{9}/); return m?m[0]:"";
}
function titleCase(s){return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}

function render(){
  const app = document.getElementById("app");
  const stats = computeStats();
  app.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="n">${stats.total}</div><div class="l">Total responses</div></div>
      <div class="kpi"><div class="n">${stats.uniqueFlats}</div><div class="l">Unique flats</div></div>
      <div class="kpi"><div class="n">${stats.duplicates}</div><div class="l">Duplicate flats</div></div>
      <div class="kpi"><div class="n">${stats.invalid}</div><div class="l">Data issues</div></div>
    </div>
    <div class="toolbar">
      <div class="search">
        <input id="q" placeholder="Search name, flat, phone, email…" value="${escapeHtml(Q)}" autocomplete="off"/>
        <button class="clear-btn" onclick="clearSearch()">CLEAR</button>
      </div>
      <select id="blk" onchange="BLOCK_FILTER=this.value;render()">
        <option value="">All blocks</option>
        ${stats.blocks.map(b=>`<option ${b===BLOCK_FILTER?"selected":""}>${b}</option>`).join("")}
      </select>
      <button class="btn" onclick="load()">↻ Refresh</button>
    </div>
    <div class="tabs">
      ${tab("summary","Summary")}${tab("directory","Directory")}
      ${tab("blocks","By Block")}${tab("duplicates","Duplicates")}
      ${tab("issues","Data Issues")}${tab("vehicles","Vehicles")}
      ${tab("whatsapp","WhatsApp")}
    </div>
    <div id="view"></div>`;
  document.getElementById("q").addEventListener("input",e=>{Q=e.target.value;renderView(stats)});
  renderView(stats);
  document.getElementById("foot").textContent =
    `Source: Google Form responses · Sheet ID ${SHEET_ID.slice(0,8)}… · Read-only.`;
}

function tab(id,label){return `<div class="tab ${TAB===id?"active":""}" onclick="TAB='${id}';render()">${label}</div>`}
function clearSearch(){Q="";render()}

function computeStats(){
  const total = ROWS.length;
  const flats = {}, blocks = {};
  ROWS.forEach(r=>{
    if(r.flatId){ flats[r.flatId]=(flats[r.flatId]||0)+1 }
    if(r.block) blocks[r.block]=(blocks[r.block]||0)+1;
  });
  const uniqueFlats = Object.keys(flats).length;
  const duplicates = Object.values(flats).filter(n=>n>1).reduce((a,n)=>a+(n-1),0);
  const invalid = ROWS.filter(r=>!r._flatValid||!r._phoneValid||!r.name).length;
  return {total,uniqueFlats,duplicates,invalid,flats,
    blocks:Object.keys(blocks).sort()};
}

function filtered(){
  const q = Q.trim().toLowerCase();
  return ROWS.filter(r=>{
    if(BLOCK_FILTER && r.block!==BLOCK_FILTER) return false;
    if(!q) return true;
    return [r.name,r.email,r.phone,r.flatId,r.vnum].join(" ").toLowerCase().includes(q);
  });
}

function renderView(stats){
  const v = document.getElementById("view");
  const rows = filtered();
  if(TAB==="summary") v.innerHTML = viewSummary(stats,rows);
  else if(TAB==="directory") v.innerHTML = viewDirectory(rows);
  else if(TAB==="blocks") v.innerHTML = viewBlocks(stats,rows);
  else if(TAB==="duplicates") v.innerHTML = viewDuplicates(stats);
  else if(TAB==="issues") v.innerHTML = viewIssues();
  else if(TAB==="vehicles") v.innerHTML = viewVehicles(rows);
  else if(TAB==="whatsapp") v.innerHTML = viewWhatsApp();
}

function viewSummary(s,rows){
  const residents = {};
  ROWS.forEach(r=>{ const k=r.resident||"—"; residents[k]=(residents[k]||0)+1 });
  const veh = {}; ROWS.forEach(r=>{ const k=r.vtype||"—"; veh[k]=(veh[k]||0)+1 });
  const latest = [...ROWS].filter(r=>r.ts).sort((a,b)=>b.ts-a.ts).slice(0,5);
  return `
    <div class="card"><h2>Resident type</h2>${barList(residents,ROWS.length)}</div>
    <div class="card"><h2>Vehicle type</h2>${barList(veh,ROWS.length)}</div>
    <div class="card"><h2>Latest 5 submissions</h2>
      <div class="tblwrap"><table><thead><tr><th>When</th><th>Flat</th><th>Name</th></tr></thead>
      <tbody>${latest.map(r=>`<tr><td>${fmtDate(r.ts)}</td><td>${r.flatId||"—"}</td><td>${escapeHtml(r.name)}</td></tr>`).join("")||empty()}</tbody></table></div>
    </div>`;
}
function viewDirectory(rows){
  return `<div class="card"><h2>Owners (${rows.length})</h2><div class="tblwrap">
    <table><thead><tr><th>Flat</th><th>Name</th><th>Phone</th><th>Vehicle</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.flatId||`<span class="pill bad">?</span>`}</td>
      <td>${escapeHtml(r.name)||`<span class="pill warn">missing</span>`}<br><span class="sub">${escapeHtml(r.email)}</span></td>
      <td>${r._phoneValid?`<a href="tel:${r.phone}">${r.phone}</a>`:`<span class="pill bad">${r.phone||"—"}</span>`}</td>
      <td>${escapeHtml(r.vnum)||"—"}<br><span class="sub">${escapeHtml(r.vtype)}</span></td>
    </tr>`).join("")||empty()}</tbody></table></div></div>`;
}
function viewBlocks(s){
  const rows = Object.entries(s.blocks.reduce((a,b)=>{a[b]=ROWS.filter(r=>r.block===b).length;return a},{}))
    .sort((a,b)=>a[0].localeCompare(b[0]));
  const max = Math.max(...rows.map(r=>r[1]),1);
  return `<div class="card"><h2>Responses per block</h2>
    <table><tbody>${rows.map(([b,n])=>`<tr>
      <td style="width:60px"><b>${b}</b></td><td>${n}<div class="bar"><i style="width:${n/max*100}%"></i></div></td>
    </tr>`).join("")}</tbody></table></div>`;
}
function viewDuplicates(s){
  const dups = Object.entries(s.flats).filter(([,n])=>n>1).sort((a,b)=>b[1]-a[1]);
  return `<div class="card"><h2>Duplicate flat submissions (${dups.length})</h2>
    ${dups.length?`<div class="tblwrap"><table><thead><tr><th>Flat</th><th>#</th><th>Names</th></tr></thead>
      <tbody>${dups.map(([f,n])=>{
        const names = ROWS.filter(r=>r.flatId===f).map(r=>escapeHtml(r.name||r.email)).join(", ");
        return `<tr><td><b>${f}</b></td><td>${n}</td><td>${names}</td></tr>`;
      }).join("")}</tbody></table></div>`:empty("No duplicates 🎉")}
  </div>`;
}
function viewIssues(){
  const bad = ROWS.filter(r=>!r._flatValid||!r._phoneValid||!r.name);
  return `<div class="card"><h2>Rows needing correction (${bad.length})</h2>
    ${bad.length?`<div class="tblwrap"><table><thead><tr><th>Flat</th><th>Name</th><th>Phone</th><th>Issue</th></tr></thead>
      <tbody>${bad.map(r=>`<tr>
        <td>${r.flatId||`<span class="pill bad">missing</span>`}</td>
        <td>${escapeHtml(r.name)||`<span class="pill warn">missing</span>`}</td>
        <td>${r._phoneValid?r.phone:`<span class="pill bad">${escapeHtml(r.phone)||"missing"}</span>`}</td>
        <td>${[!r._flatValid&&"flat",!r._phoneValid&&"phone",!r.name&&"name"].filter(Boolean).join(", ")}</td>
      </tr>`).join("")}</tbody></table></div>`:empty("All clean ✅")}
  </div>`;
}
function viewVehicles(rows){
  const g = {}; rows.forEach(r=>{const k=r.vtype||"—"; g[k]=(g[k]||0)+1});
  const missing = rows.filter(r=>!r.vnum).length;
  return `<div class="card"><h2>Vehicle breakdown</h2>${barList(g,rows.length)}
    <p class="sub">Missing vehicle number: <b>${missing}</b></p></div>`;
}
function viewWhatsApp(){
  const bad = ROWS.filter(r=>r._phoneValid && (!r._flatValid||!r.vnum||!r.name));
  return `<div class="card"><h2>WhatsApp reminders (${bad.length})</h2>
    <p class="sub">Click to open WhatsApp with a prefilled reminder.</p>
    <div class="tblwrap"><table><thead><tr><th>Owner</th><th>Phone</th><th>Send</th></tr></thead>
    <tbody>${bad.map(r=>`<tr>
      <td>${escapeHtml(r.name)||"—"}<br><span class="sub">${r.flatId||"flat?"}</span></td>
      <td>${r.phone}</td>
      <td><a class="wa" target="_blank" href="https://wa.me/91${r.phone}?text=${encodeURIComponent(REMINDER_MSG)}">WhatsApp</a></td>
    </tr>`).join("")||empty("Nothing pending 🎉")}</tbody></table></div></div>`;
}

function barList(obj,total){
  const entries = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(...entries.map(e=>e[1]),1);
  return `<table><tbody>${entries.map(([k,n])=>`<tr>
    <td>${escapeHtml(k)}</td><td style="width:60px;text-align:right">${n}</td>
    <td><div class="bar"><i style="width:${n/max*100}%"></i></div></td>
  </tr>`).join("")}</tbody></table>`;
}
function empty(msg){return `<div class="empty">${msg||"No data"}</div>`}
function fmtDate(d){return d?d.toLocaleString([], {dateStyle:"short",timeStyle:"short"}):"—"}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

load();
setInterval(load, 5*60*1000); // auto-refresh every 5 min
</script>
</body>
</html>
